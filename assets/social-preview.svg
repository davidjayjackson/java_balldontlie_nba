<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#182848"/>
      <stop offset="100%" stop-color="#0F1A30"/>
    </linearGradient>
    <radialGradient id="ball" cx="35%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#FFA359"/>
      <stop offset="45%" stop-color="#F0700F"/>
      <stop offset="100%" stop-color="#B8460A"/>
    </radialGradient>
    <radialGradient id="shine" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#gridPattern)"/>

  <!-- basketball, r=120 centered at (640,180) -->
  <g filter="url(#softShadow)">
    <circle cx="640" cy="180" r="120" fill="url(#ball)" stroke="#161A22" stroke-width="8"/>
    <path d="M640 60 V300" stroke="#161A22" stroke-width="8" fill="none"/>
    <path d="M520 180 H760" stroke="#161A22" stroke-width="8" fill="none"/>
    <path d="M640 60 C577 132 577 228 640 300" stroke="#161A22" stroke-width="8" fill="none"/>
    <path d="M640 60 C703 132 703 228 640 300" stroke="#161A22" stroke-width="8" fill="none"/>
    <ellipse cx="602" cy="146" rx="55" ry="40" fill="url(#shine)"/>
  </g>

  <!-- spreadsheet badge, anchored into the ball's lower-right edge -->
  <g filter="url(#softShadow)">
    <rect x="668" y="208" width="118" height="118" rx="21" fill="#F5F7FA" stroke="#0F1A30" stroke-width="5"/>
    <g stroke="#93A1B8" stroke-width="3">
      <path d="M668 247 H786"/>
      <path d="M668 286 H786"/>
      <path d="M707 208 V326"/>
      <path d="M747 208 V326"/>
    </g>
    <rect x="707" y="247" width="40" height="39" fill="#EA580C" opacity="0.92"/>
  </g>

  <!-- title block, centered -->
  <g font-family="Liberation Sans, Arial, sans-serif" text-anchor="middle">
    <text x="640" y="410" font-size="54" font-weight="700" fill="#F5F7FA">balldontlie NBA Calc Add-In</text>
    <text x="640" y="448" font-size="23" fill="#A9B4C7">NBA teams, games, standings &amp; player stats as LibreOffice Calc formulas</text>
  </g>

  <!-- formula chips, centered row -->
  <g font-family="Liberation Mono, DejaVu Sans Mono, monospace" font-size="18">
    <rect x="239" y="470" width="180" height="40" rx="20" fill="none" stroke="#EA580C" stroke-width="1.5" opacity="0.85"/>
    <text x="329" y="496" fill="#FFD8B8" text-anchor="middle">NBA_SCORE()</text>

    <rect x="433" y="470" width="212" height="40" rx="20" fill="none" stroke="#EA580C" stroke-width="1.5" opacity="0.85"/>
    <text x="539" y="496" fill="#FFD8B8" text-anchor="middle">NBA_STANDINGS()</text>

    <rect x="659" y="470" width="176" height="40" rx="20" fill="none" stroke="#EA580C" stroke-width="1.5" opacity="0.85"/>
    <text x="747" y="496" fill="#FFD8B8" text-anchor="middle">NBA_TEAMS()</text>

    <rect x="849" y="470" width="192" height="40" rx="20" fill="none" stroke="#EA580C" stroke-width="1.5" opacity="0.85"/>
    <text x="945" y="496" fill="#FFD8B8" text-anchor="middle">NBA_BOXSCORE()</text>
  </g>

  <text x="640" y="560" font-family="Liberation Sans, Arial, sans-serif" font-size="16" fill="#6E7A90" text-anchor="middle">Java 8 &#183; zero dependencies &#183; MIT licensed</text>
</svg>
